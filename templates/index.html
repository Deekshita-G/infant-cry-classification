<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infant Cry Analyzer</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>Infant Cry Analyzer</h1>
<p class="subtitle">Upload infant cry audio for analysis</p>

<button id="uploadBtn">Upload Audio</button>
<input type="file" id="fileInput" accept="audio/*" hidden>

<p id="uploadMsg" class="hidden success">File uploaded successfully</p>

<canvas id="wave"></canvas>

<div id="processing" class="hidden">
<p>Analyzing cry pattern...</p>
</div>

<div id="result" class="hidden result-card">
<h2 id="status"></h2>
<p id="advice" class="advice"></p>

<div class="confidence-bar">
<div id="confidenceFill"></div>
</div>

<p>Confidence: <span id="conf"></span></p>
</div>

</div>

<script>

const uploadBtn = document.getElementById("uploadBtn");
const fileInput = document.getElementById("fileInput");
const uploadMsg = document.getElementById("uploadMsg");
const processing = document.getElementById("processing");
const result = document.getElementById("result");
const status = document.getElementById("status");
const advice = document.getElementById("advice");
const conf = document.getElementById("conf");
const confidenceFill = document.getElementById("confidenceFill");

const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");
canvas.width = 340;
canvas.height = 90;

uploadBtn.onclick = () => fileInput.click();

fileInput.onchange = () => {
if(fileInput.files.length){
handle(fileInput.files[0]);
}
};

function handle(file){

uploadMsg.classList.remove("hidden");
setTimeout(()=>uploadMsg.classList.add("hidden"),1500);

drawWave(file);

processing.classList.remove("hidden");
result.classList.add("hidden");

const fd = new FormData();
fd.append("file", file);

fetch("/predict",{method:"POST",body:fd})
.then(r=>r.json())
.then(data=>{

processing.classList.add("hidden");
result.classList.remove("hidden");

status.innerText = data.prediction;
conf.innerText = data.confidence;
confidenceFill.style.width = (parseFloat(data.confidence)*100)+"%";

if(data.advice){
advice.innerText = data.advice;
}

if(data.prediction.includes("Asphyxia")){
document.body.className = "danger";
}
else if(data.prediction.includes("Attention")){
document.body.className = "warning";
}
else{
document.body.className = "safe";
}

});
}

function drawWave(file){

const audioCtx=new AudioContext();
const reader=new FileReader();

reader.onload=e=>{
audioCtx.decodeAudioData(e.target.result,buff=>{
const data=buff.getChannelData(0);
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.beginPath();

for(let i=0;i<canvas.width;i++){
const ind=Math.floor(i/data.length*data.length);
const y=(data[ind]*30)+45;
ctx.lineTo(i,y);
}

ctx.strokeStyle="#2c7be5";
ctx.lineWidth=2;
ctx.stroke();
});
};

reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
