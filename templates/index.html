<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infant Cry Analyzer</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>Infant Cry Analyzer</h1>
<p class="subtitle">Acoustic Cry Pattern Evaluation</p>

<button id="uploadBtn">Upload Cry Audio</button>
<input type="file" id="fileInput" accept="audio/*" hidden>

<p id="uploadMsg" class="hidden success">File uploaded successfully</p>

<canvas id="wave"></canvas>

<div id="processing" class="hidden">
<p>Analyzing acoustic patterns...</p>
</div>

<div id="report" class="hidden report-card">

<h2>Infant Cry Analysis Report</h2>

<div class="section">
<h3 id="classification"></h3>
<p id="risk"></p>
</div>

<div class="section">
<strong>Possible Cry Pattern:</strong>
<p id="pattern"></p>
</div>

<div class="section">
<strong>Confidence Score:</strong>
<div class="confidence-bar">
<div id="confidenceFill"></div>
</div>
<p><span id="confidenceText"></span> — <span id="reliability"></span></p>
</div>

<div class="section">
<strong>Care Guidance:</strong>
<ul id="guidanceList"></ul>
</div>

</div>

</div>

<script>

const uploadBtn = document.getElementById("uploadBtn");
const fileInput = document.getElementById("fileInput");
const uploadMsg = document.getElementById("uploadMsg");
const processing = document.getElementById("processing");
const report = document.getElementById("report");

uploadBtn.onclick = () => fileInput.click();

fileInput.onchange = () => {
if(fileInput.files.length){
handle(fileInput.files[0]);
}
};

function handle(file){

uploadMsg.classList.remove("hidden");
setTimeout(()=>uploadMsg.classList.add("hidden"),1500);

drawWave(file);

processing.classList.remove("hidden");
report.classList.add("hidden");

const fd = new FormData();
fd.append("file", file);

fetch("/predict",{method:"POST",body:fd})
.then(r=>r.json())
.then(data=>{

processing.classList.add("hidden");
report.classList.remove("hidden");

document.getElementById("classification").innerText = data.classification;
document.getElementById("risk").innerText = data.risk_level;
document.getElementById("pattern").innerText = data.pattern;
document.getElementById("confidenceText").innerText = data.confidence;
document.getElementById("reliability").innerText = data.reliability;

document.getElementById("confidenceFill").style.width =
(parseFloat(data.confidence)*100)+"%";

const list = document.getElementById("guidanceList");
list.innerHTML = "";
data.guidance.forEach(item=>{
const li = document.createElement("li");
li.innerText = item;
list.appendChild(li);
});

});
}

function drawWave(file){

const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");
canvas.width = 340;
canvas.height = 90;

const audioCtx=new AudioContext();
const reader=new FileReader();

reader.onload=e=>{
audioCtx.decodeAudioData(e.target.result,buff=>{
const data=buff.getChannelData(0);
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.beginPath();

for(let i=0;i<canvas.width;i++){
const ind=Math.floor(i/data.length*data.length);
const y=(data[ind]*30)+45;
ctx.lineTo(i,y);
}

ctx.strokeStyle="#2c7be5";
ctx.lineWidth=2;
ctx.stroke();
});
};

reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
