<!DOCTYPE html>
<html>

<head>

<title>Infant Cry Analyzer</title>

<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#2563eb">

<!-- WaveSurfer library -->
<script src="https://unpkg.com/wavesurfer.js"></script>

<!-- Favicon -->
<link rel="icon" href="/static/baby.png">

</head>


<body>

<header>
<h1>👶 Infant Cry Analysis System</h1>
</header>


<!-- ================= DASHBOARD ================= -->

<div class="dashboard">

<div class="status-card">
<h3>Current Status</h3>
<p id="status">Waiting for audio</p>
</div>

<div class="status-card">
<h3>Asphyxia Risk</h3>
<p id="risk">Not analyzed</p>
</div>

<div class="status-card">
<h3>Confidence</h3>
<p id="confidence">--</p>
</div>

</div>


<!-- ================= MAIN CONTENT ================= -->

<div class="main">


<!-- Baby Illustration -->

<div class="baby-image">
<img src="/static/baby.png" width="250" alt="Baby Illustration">
</div>


<!-- Upload Section -->

<div class="upload-section">

<h2>Upload Cry Audio</h2>

<input type="file" id="audioFile" accept=".wav">

<button onclick="analyzeCry()">Analyze Cry</button>

</div>


<!-- Waveform Visualizer -->

<div id="waveform"></div>


<!-- ================= RESULTS ================= -->

<div class="results">

<h2>Analysis Results</h2>

<p><b>Cry Type:</b> <span id="cryType">---</span></p>

<p id="causeRow" style="display:none;">
<b>Possible Cause:</b> <span id="cause"></span>
</p>

<p><b>Confidence:</b> <span id="confValue">---</span></p>

</div>

</div>


<!-- Script (load AFTER page elements exist) -->

<script src="/static/script.js"></script>

</body>

</html>
