<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baby Cry Analyzer</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/static/manifest.json">
</head>

<body>

<div class="bg-toys">🧸 ⭐ 🍼 👶 🌙 🎈</div>

<div class="container">

<h1>👶 Baby Cry Analyzer</h1>
<p>Upload baby's cry audio 💙</p>

<div class="buttons">
<button id="uploadBtn">📁 Upload Audio</button>
<input type="file" id="fileInput" accept="audio/*" hidden>
</div>

<canvas id="wave"></canvas>

<audio id="player" controls class="hidden"></audio>

<div id="loading" class="hidden">
<div class="baby">👶</div>
<p>Deciphering the reason for a baby's cry ...</p>
</div>

<div id="result" class="hidden">
<img id="babyImg" width="140">
<h2 id="status"></h2>
<p>Confidence: <span id="conf"></span></p>
<p id="hint"></p>
<p id="reliability"></p>


</div>

</div>

<script>

const uploadBtn=document.getElementById("uploadBtn");
const fileInput=document.getElementById("fileInput");
const player=document.getElementById("player");
const loading=document.getElementById("loading");
const result=document.getElementById("result");
const status=document.getElementById("status");
const conf=document.getElementById("conf");
const babyImg=document.getElementById("babyImg");

const canvas=document.getElementById("wave");
const ctx=canvas.getContext("2d");

canvas.width=320;
canvas.height=90;

uploadBtn.onclick=()=>fileInput.click();

fileInput.onchange=()=>{
if(fileInput.files.length){
handle(fileInput.files[0]);
}
};

function handle(file){

player.src=URL.createObjectURL(file);
player.classList.remove("hidden");
player.play();

drawRealWave(file);
cuteProcessSound();

loading.classList.remove("hidden");
result.classList.add("hidden");

const fd=new FormData();
fd.append("file",file);

fetch("/predict",{method:"POST",body:fd})
.then(r=>r.json())
.then(data=>{

loading.classList.add("hidden");
result.classList.remove("hidden");

if(data.error){
status.innerText=data.error;
return;
}

status.innerText=data.prediction;
conf.innerText=data.confidence;
document.getElementById("hint").innerText = data.hint || "";
document.getElementById("reliability").innerText = data.reliability || "";



// ---- SAFE BACKGROUND + BABY IMAGE ----
if(data.prediction.includes("Asphyxia")){
document.body.className="danger";
babyImg.src="https://cdn-icons-png.flaticon.com/512/742/742752.png";
speak("Warning. Possible asphyxia detected");
}
else if(data.prediction.includes("Attention")){
document.body.className="alert";
babyImg.src="https://cdn-icons-png.flaticon.com/512/742/742751.png";
speak("Baby needs attention soon");
}
else if(data.prediction.includes("cry")){
document.body.className="";
babyImg.src="https://cdn-icons-png.flaticon.com/512/742/742751.png";
speak("Please upload a baby cry sound");
}
else{
document.body.className="safe";
babyImg.src="https://cdn-icons-png.flaticon.com/512/742/742920.png";
speak("Baby seems okay");
}

});

}

function cuteProcessSound(){
const a=new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b9f2d.mp3");
a.volume=0.2;
a.play();
}

function speak(t){
const u=new SpeechSynthesisUtterance(t);
u.pitch=1.8;
u.rate=0.95;
speechSynthesis.speak(u);
}

function drawRealWave(file){

const audioCtx=new AudioContext();
const reader=new FileReader();

reader.onload=e=>{
audioCtx.decodeAudioData(e.target.result,buff=>{
const data=buff.getChannelData(0);
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.beginPath();

for(let i=0;i<canvas.width;i++){
const ind=Math.floor(i/data.length*data.length);
const y=(data[ind]*30)+45;
ctx.lineTo(i,y);
}

ctx.strokeStyle="#ff7eb3";
ctx.lineWidth=3;
ctx.stroke();
});
};

reader.readAsArrayBuffer(file);
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("/static/sw.js");
}

</script>

</body>
</html>
