<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infant Cry Analyzer</title>

<!-- CSS -->
<link rel="stylesheet" href="/static/style.css">

<!-- PWA Manifest -->
<link rel="manifest" href="/manifest.json">

<!-- Theme Color -->
<meta name="theme-color" content="#2563eb">

<!-- Favicon -->
<link rel="icon" type="image/png" href="/static/baby.png">

<!-- WaveSurfer library -->
<script src="https://unpkg.com/wavesurfer.js"></script>

</head>


<body>

<header>
<h1>👶 Infant Cry Analysis System</h1>
</header>


<!-- ================= DASHBOARD ================= -->

<div class="dashboard">

<div class="status-card">
<h3>Current Status</h3>
<p id="status">Waiting for audio</p>
</div>

<div class="status-card">
<h3>Asphyxia Risk</h3>
<p id="risk">Not analyzed</p>
</div>

<div class="status-card">
<h3>Confidence</h3>
<p id="confidence">--</p>
</div>

</div>


<!-- ================= MAIN CONTENT ================= -->

<div class="main">

<!-- Baby Illustration -->

<div class="baby-image">
<img src="/static/baby.png" width="250" alt="Baby Illustration">
</div>


<!-- ================= AUDIO UPLOAD ================= -->

<div class="upload-section">

<h2>Upload Cry Audio</h2>

<input type="file" id="audioFile" accept="audio/*">

<button onclick="analyzeCry()">Analyze Cry</button>

</div>


<!-- ================= WAVEFORM ================= -->

<div id="waveform"></div>


<!-- ================= RESULTS ================= -->

<div class="results">

<h2>Analysis Results</h2>

<p><b>Cry Type:</b> <span id="cryType">---</span></p>

<p id="causeRow" style="display:none;">
<b>Possible Cause:</b> <span id="cause"></span>
</p>

<p><b>Confidence:</b> <span id="confValue">---</span></p>

</div>

</div>


<!-- Script loaded at bottom (recommended) -->

<script src="/static/script.js"></script>

</body>
</html>
